services:
  - type: web
    name: zolve-crm-api
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && node dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zolve-postgres
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        value: your-secret-key-here
      - key: FRONTEND_URL
        value: https://zolve-cross-sales-staging.web.app

databases:
  - name: zolve-postgres
    databaseName: zolve
    region: oregon
