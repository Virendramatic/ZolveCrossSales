version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: zolve_crm_db
    environment:
      POSTGRES_USER: zolve_user
      POSTGRES_PASSWORD: zolve_password
      POSTGRES_DB: zolve_crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zolve_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zolve_crm_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
